apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-management-app
  namespace: loan-management

spec:
  replicas: 2

  selector:
    matchLabels:
      app: loan-management-app

  template:
    metadata:
      labels:
        app: loan-management-app

    spec:
      containers:
      - name: loan-management-app

        image: gopistark/loan-management-system:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        envFrom:
        - configMapRef:
            name: loan-management-config

        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"

          limits:
            cpu: "500m"
            memory: "1Gi"

        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 20
